services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conectapro
      POSTGRES_PASSWORD: conectapro
      POSTGRES_DB: conectapro
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conectapro"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      APP_ORIGIN: https://app.example.com
      PUBLIC_WEBHOOK_BASE_URL: https://app.example.com
      DB_DRIVER: postgres
      POSTGRES_URL: postgres://conectapro:conectapro@postgres:5432/conectapro
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5174"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
