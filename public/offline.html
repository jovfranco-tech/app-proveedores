<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Proveedores | Sin conexion</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #17211d;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 34rem),
          linear-gradient(180deg, #f4f7f5, #ffffff);
        font-family: "DM Sans", ui-sans-serif, system-ui, sans-serif;
      }

      main {
        width: min(92vw, 520px);
        padding: 2rem;
        border: 1px solid #d9e1dd;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 45px rgba(19, 43, 35, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 8vw, 3.25rem);
        line-height: 1;
      }

      p {
        color: #58645f;
        line-height: 1.7;
      }

      button {
        min-height: 44px;
        padding: 0 1.2rem;
        border: 0;
        border-radius: 10px;
        color: #fff;
        background: #0f766e;
        font: inherit;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexion</h1>
      <p>No pudimos conectar con el servidor. Si ya habias abierto la app, algunas pantallas pueden seguir disponibles desde cache.</p>
      <button type="button" onclick="window.location.reload()">Reintentar</button>
    </main>
  </body>
</html>
